<h1>IPL Auction</h1>

{% for p in players %}

<div style="border:1px solid black; padding:10px; margin:10px">

<h2>{{p[1]}}</h2>

<p>Base Price: {{p[2]}}</p>
<p>Highest Bid: {{p[3]}}</p>
<p>Highest Bidder: {{p[4]}}</p>

<form action="/bid" method="POST">

<input type="hidden" name="player_id" value="{{p[0]}}">

<input name="bidder" placeholder="Team Name">

<input name="bid" type="number" placeholder="Your Bid">

<button type="submit">Place Bid</button>

</form>

</div>

{% endfor %}
