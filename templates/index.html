<!DOCTYPE html>
<html>
<head>
<title>IPL Auction</title>

<style>

body{
    font-family: Arial;
    background:#f5f5f5;
    text-align:center;
}

h1{
    margin-top:20px;
}

.container{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
}

.card{
    background:white;
    width:250px;
    margin:15px;
    padding:20px;
    border-radius:10px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

button{
    padding:8px 14px;
    margin-top:10px;
    border:none;
    border-radius:5px;
    background:#1e90ff;
    color:white;
    cursor:pointer;
}

.bid-section{
    display:none;
    margin-top:10px;
}

input, select{
    padding:6px;
    margin-top:5px;
    width:90%;
}

</style>

<script>

function toggleBid(id){
    var x = document.getElementById("bid-"+id);

    if(x.style.display === "none"){
        x.style.display = "block";
    } else {
        x.style.display = "none";
    }
}

</script>

</head>

<body>

<h1>🏏 IPL Auction</h1>

<div class="container">

{% for p in players %}

<div class="card">

<h2>{{p[1]}}</h2>

<p><b>Base Price:</b> {{p[2]}}</p>
<p><b>Highest Bid:</b> {{p[3]}}</p>
<p><b>Highest Bidder:</b> {{p[4]}}</p>

<button onclick="toggleBid({{p[0]}})">View Player / Bid</button>

<div class="bid-section" id="bid-{{p[0]}}">

<form action="/bid" method="POST">

<input type="hidden" name="player_id" value="{{p[0]}}">

<select name="bidder" required>
<option value="">Select Team</option>
<option value="CSK">CSK</option>
<option value="MI">MI</option>
<option value="RCB">RCB</option>
<option value="LSG">LSG</option>
</select>

<br>

<input type="number" name="bid" placeholder="Enter Bid" required>

<br>

<button type="submit">Place Bid</button>

</form>

</div>

</div>

{% endfor %}

</div>

</body>
</html>
